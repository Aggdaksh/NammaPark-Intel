services:
  - type: web
    name: nammapark-intel-api
    runtime: node
    buildCommand: npm install
    startCommand: node backend/node/index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: UPSTASH_REDIS_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.8"
